<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Member Login - Austin Golf Club</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #e9ecef;
            color: #111111;
        }
        .login-box {
            width: 100%;
            max-width: 320px;
            padding: 2rem;
            text-align: center;
        }
        h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }
        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
            color: #555555;
        }
        input {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #cccccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #111111;
        }
        button {
            width: 100%;
            padding: 0.7rem;
            background-color: #111111;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:hover {
            background-color: #333333;
        }
        .back-link {
            margin-top: 1.5rem;
            display: block;
            font-size: 0.85rem;
            color: #555555;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Member Login</h2>
        <form onsubmit="event.preventDefault(); alert('Invalid credentials or account inactive. Please contact the Golf Shop.');">
            <div class="input-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Sign In</button>
        </form>
        <a href="index.html" class="back-link">← Back to home</a>
    </div>

</body>
</html>
